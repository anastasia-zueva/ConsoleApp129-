name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore packages
        run: nuget restore ConsoleApp129.sln

      - name: Build
        run: msbuild ConsoleApp129.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Test
        run: echo "Build finished"

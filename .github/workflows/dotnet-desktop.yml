name: .NET Framework CI

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet packages
      run: |
        $slnFile = Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1
        Write-Host "Found solution: $($slnFile.FullName)"
        nuget restore $slnFile.FullName -PackagesDirectory packages
        Write-Host "Packages restored"
        Get-ChildItem packages -Recurse -Filter "MSTest*.dll" | Select-Object FullName -First 5

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Build solution
      run: |
        $slnFile = Get-ChildItem -Recurse -Filter "*.sln" | Select-Object -First 1
        msbuild $slnFile.FullName /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

    - name: Run tests
      run: |
        $testDll = Get-ChildItem -Recurse -Filter "ConsoleApp129.Tests.dll" | Where-Object { $_.FullName -notlike "*obj*" -and $_.FullName -notlike "*packages*" } | Select-Object -First 1
        if ($testDll) {
          vstest.console.exe $testDll.FullName
        } else {
          Write-Host "Test DLL not found, searching for any DLL..."
          Get-ChildItem -Recurse -Filter "*.dll" | Select-Object FullName -First 10
          exit 1
        }

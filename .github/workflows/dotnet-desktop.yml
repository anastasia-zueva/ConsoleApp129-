name: .NET Framework CI

on:
push:
branches: [ "main" ]
pull_request:
branches: [ "main" ]

jobs:
build:
runs-on: windows-latest

```
steps:
- name: Checkout repository
  uses: actions/checkout@v4

- name: Setup MSBuild
  uses: microsoft/setup-msbuild@v2

- name: Setup NuGet
  uses: NuGet/setup-nuget@v2

- name: Restore NuGet packages
  run: nuget restore ConsoleApp129.sln -PackagesDirectory ConsoleApp129.Tests/packages

- name: Build solution
  run: msbuild ConsoleApp129.sln /p:Configuration=Release /p:Platform="Any CPU" /p:RestorePackages=false

- name: Run tests
  run: |
    vstest.console.exe ConsoleApp129.Tests\bin\Release\ConsoleApp129.Tests.dll
```

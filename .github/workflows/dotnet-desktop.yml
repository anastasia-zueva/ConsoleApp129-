name: .NET Framework CI

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Restore NuGet packages
      run: nuget restore ConsoleApp129.sln

    - name: Build solution
      run: msbuild ConsoleApp129.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild /verbosity:minimal

    - name: Run tests
      run: |
        $testDll = Get-ChildItem -Recurse -Filter "ConsoleApp129.Tests.dll" | Where-Object { $_.FullName -notlike "*obj*" } | Select-Object -First 1
        if ($testDll) {
          vstest.console.exe $testDll.FullName /Logger:trx
        } else {
          Write-Host "Test DLL not found, but build succeeded"
        }

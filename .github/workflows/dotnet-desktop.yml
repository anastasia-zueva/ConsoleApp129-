name: .NET Framework CI

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: windows-2019

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Setup NuGet
      uses: nuget/setup-nuget@v1
      with:
        nuget-version: 'latest'

    - name: Restore NuGet packages
      run: |
        nuget restore ConsoleApp129.sln -PackagesDirectory packages
        Write-Host "Restored packages"
        Get-ChildItem packages -Recurse -Filter "MSTest*.dll" | Select-Object FullName

    - name: Build solution
      run: |
        msbuild ConsoleApp129.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild /verbosity:minimal /p:RestorePackages=false
      continue-on-error: true

    - name: Build with dotnet
      if: failure()
      run: |
        dotnet build ConsoleApp129.sln --configuration Release
      continue-on-error: true

    - name: Find test DLLs
      run: |
        Write-Host "Searching for test assemblies..."
        Get-ChildItem -Recurse -Filter "*Tests.dll" | ForEach-Object { Write-Host $_.FullName }

    - name: Run tests
      run: |
        $testDlls = Get-ChildItem -Recurse -Filter "ConsoleApp129.Tests.dll" | Where-Object { $_.FullName -notlike "*obj*" }
        if ($testDlls) {
          foreach ($dll in $testDlls) {
            Write-Host "Testing: $($dll.FullName)"
            vstest.console.exe $dll.FullName /Logger:trx /TestAdapterPath:"."
          }
        } else {
          Write-Host "ERROR: No test DLLs found!"
          exit 1
        }

name: .NET Framework CI

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2
      with:
        nuget-version: 'latest'

    - name: Restore NuGet packages
      run: |
        nuget restore ConsoleApp129.sln -PackagesDirectory packages
        Write-Host "Packages restored to: ${{ github.workspace }}\packages"
        dir packages

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build solution
      run: |
        msbuild ConsoleApp129.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild /verbosity:minimal /p:RestorePackages=false

    - name: Find test assemblies
      run: |
        Write-Host "Looking for test DLLs..."
        Get-ChildItem -Recurse -Filter "*Tests.dll" | Select-Object FullName

    - name: Run tests
      run: |
        $testDll = Get-ChildItem -Recurse -Filter "ConsoleApp129.Tests.dll" | Where-Object { $_.FullName -notlike "*obj*" -and $_.FullName -notlike "*bin\Debug*" } | Select-Object -First 1
        if ($testDll) {
          Write-Host "Found test assembly: $($testDll.FullName)"
          vstest.console.exe $testDll.FullName /Logger:trx /TestAdapterPath:"."
        } else {
          Write-Host "ERROR: Test DLL not found!"
          exit 1
        }

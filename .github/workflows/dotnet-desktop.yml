name: .NET CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: |
        nuget restore ConsoleApp129.sln -PackagesDirectory packages

    - name: Build solution
      run: |
        msbuild ConsoleApp129.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild /verbosity:minimal

    - name: Run tests
      run: |
        vstest.console.exe "ConsoleApp129.Tests\bin\Release\ConsoleApp129.Tests.dll" /Logger:trx /TestAdapterPath:"."
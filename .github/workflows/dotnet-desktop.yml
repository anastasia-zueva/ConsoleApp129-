name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore "ConsoleApp129.sln" -PackagesDirectory "ConsoleApp129.Tests\ConsoleApp129.Tests\packages"

      - name: Build solution
        run: msbuild "ConsoleApp129.sln" /p:Configuration=Release /p:Platform="Any CPU" /p:RestorePackages=false

      - name: Find test DLL
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Recurse -Filter "ConsoleApp129.Tests.dll" |
            Select-Object -ExpandProperty FullName

      - name: Run tests
        shell: pwsh
        run: |
          $testDll = Get-ChildItem -Path . -Recurse -Filter "ConsoleApp129.Tests.dll" | Select-Object -First 1
          if (-not $testDll) {
            throw "Test DLL not found"
          }
          vstest.console.exe "$($testDll.FullName)"
